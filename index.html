<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FeetShop Coin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #score {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #FFD700;
        }
        .heart {
            font-size: 120px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }
        .heart:active {
            transform: scale(0.85);
        }
    </style>
</head>
<body>
    <div id="score">0 ⭐</div>
    <div class="heart" onclick="clickHeart()">❤️</div>

    <script>
        const tg = Telegram.WebApp;
        tg.expand();
        tg.ready();

        let score = 0;

        // 1. Пробуем взять баланс из URL (если бот передал)
        const urlParams = new URLSearchParams(window.location.search);
        const urlBalance = parseInt(urlParams.get('balance'));
        if (urlBalance && urlBalance > 0) {
            score = urlBalance;
            document.getElementById('score').innerText = score + " ⭐";
        }

        // 2. Запрашиваем актуальный баланс у бота
        tg.sendData(JSON.stringify({ action: "get_balance" }));

        // 3. Ждём ответ от бота и обновляем
        const originalFetch = window.fetch;
        // Слушаем сообщения через Telegram WebApp
        setInterval(() => {
            // Баланс обновится при следующем открытии через URL
        }, 1000);

        function clickHeart() {
            score++;
            document.getElementById('score').innerText = score + " ⭐";
            tg.HapticFeedback.impactOccurred('medium');
            tg.sendData(JSON.stringify({ action: "click" }));
        }
    </script>
</body>
</html>
