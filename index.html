<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeetShop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: manipulation; }
        .tab { display: none; width: 100%; height: 85%; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        #score { font-size: 40px; margin-bottom: 20px; color: #ff4d4d; }
        
        /* Сердечко */
        .heart { font-size: 100px; cursor: pointer; transition: transform 0.1s; }
        .heart:active { transform: scale(0.8); }

        /* Магазин */
        .shop-item { background: #333; margin: 10px; padding: 15px; border-radius: 15px; width: 80%; text-align: center; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #222; justify-content: space-around; padding: 15px; }
        button { padding: 10px 20px; border-radius: 10px; border: none; background: #ff4d4d; color: white; font-weight: bold; }
        
        /* Звезды */
        .star { position: absolute; pointer-events: none; animation: fly 0.8s ease-out; }
        @keyframes fly { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="clicker" class="tab active">
        <div id="score">0 ⭐</div>
        <div class="heart" onclick="clickHeart(event)">❤️</div>
    </div>

    <div id="shop" class="tab">
        <h2>🛒 Магазин</h2>
        <div class="shop-item">💍 Наперсток<br><button onclick="buy('thimble')">Купить</button></div>
        <div class="shop-item">🖱️ Мышь<br><button onclick="buy('mouse')">Купить</button></div>
    </div>

    <div class="nav">
        <button onclick="switchTab('clicker')">👆 Кликер</button>
        <button onclick="switchTab('shop')">🛒 Магазин</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let s = 0;

        function clickHeart(e) {
            s++;
            document.getElementById('score').innerText = s + " ⭐";
            const star = document.createElement('div');
            star.className = 'star'; star.innerText = '✨';
            star.style.left = e.clientX + 'px'; star.style.top = e.clientY + 'px';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 800);
            tg.sendData(JSON.stringify({action: "click"}));
        }

        function buy(item) { tg.sendData(JSON.stringify({action: "buy_" + item})); }
        function switchTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
