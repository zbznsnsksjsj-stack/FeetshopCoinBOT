<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .heart { font-size: 120px; cursor: pointer; transition: transform 0.1s; }
        .heart:active { transform: scale(0.8); }
        #score { font-size: 40px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="score">0 ⭐</div>
    <div class="heart" onclick="clickHeart()">❤️</div>

    <script>
        let score = 0;
        const tg = window.Telegram.WebApp;
        tg.expand();

        function clickHeart() {
            score++;
            document.getElementById('score').innerText = score + " ⭐";
            tg.sendData(JSON.stringify({action: "click"}));
        }
    </script>
</body>
</html>
