<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FeetShop Coin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #score {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #FFD700;
        }
        .heart {
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .heart:active { transform: scale(0.85); }
        .loading {
            font-size: 16px;
            color: #888;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">Загрузка баланса...</div>
    <div id="score">0 ⭐</div>
    <div class="heart" id="heart" onclick="clickHeart()" style="display:none;">❤️</div>

    <script>
        const tg = Telegram.WebApp;
        tg.expand();
        tg.ready();

        let score = 0;

        // Функция загрузки баланса
        function loadBalance() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('heart').style.display = 'none';
            
            // Отправляем запрос боту
            tg.sendData(JSON.stringify({ action: "get_balance" }));
            
            // Ждём и проверяем URL
            setTimeout(() => {
                const params = new URLSearchParams(window.location.search);
                const bal = parseInt(params.get('balance'));
                if (bal && bal > 0) {
                    score = bal;
                    document.getElementById('score').innerText = score + " ⭐";
                }
                document.getElementById('loading').style.display = 'none';
                document.getElementById('heart').style.display = 'block';
            }, 500);
        }

        // Клик
        function clickHeart() {
            score++;
            document.getElementById('score').innerText = score + " ⭐";
            tg.HapticFeedback.impactOccurred('medium');
            tg.sendData(JSON.stringify({ action: "click" }));
        }

        // Загружаем баланс при открытии
        loadBalance();

        // Перезагружаем при возвращении в приложение
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                loadBalance();
            }
        });
    </script>
</body>
</html>
