<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeetShop Coin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow-y: auto; }
        .tab { display: none; width: 100%; flex-direction: column; align-items: center; padding: 20px; }
        .active { display: flex; }
        .shop-item { background: #333; margin: 10px; padding: 15px; border-radius: 10px; width: 90%; text-align: center; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px; background: #222; }
        button { padding: 10px 20px; border-radius: 10px; border: none; background: #ffcc00; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="clicker-tab" class="tab active">
        <h1>Кликай! 👆</h1>
        <button style="font-size: 60px; background: none;" onclick="sendAction('click')">👆</button>
    </div>

    <div id="shop-tab" class="tab">
        <h2>🛒 Магазин</h2>
        <div class="shop-item">💍 Наперсток<br><button onclick="sendAction('buy_thimble')">Купить</button></div>
        <div class="shop-item">🖱️ Мышь<br><button onclick="sendAction('buy_mouse')">Купить</button></div>
        <div class="shop-item">☕ Кофе<br><button onclick="sendAction('buy_coffee')">Купить</button></div>
    </div>

    <div class="nav">
        <button onclick="switchTab('clicker-tab')">👆 Кликер</button>
        <button onclick="switchTab('shop-tab')">🛒 Магазин</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function switchTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function sendAction(action) {
            tg.sendData(JSON.stringify({action: action}));
        }
    </script>
</body>
</html>
