<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Clicker</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

#coins{
    font-size:42px;
    margin-bottom:20px;
}

#coinBtn{
    width:250px;
    height:250px;
    cursor:pointer;
    margin:auto;
}

#coinBtn:active{
    transform:scale(0.95);
}

.upgrade{
    margin-top:20px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h1>Crypto Clicker</h1>

<div id="coins">0</div>

<model-viewer
    id="coinBtn"
    src="block.glb"
    camera-controls
    auto-rotate
    exposure="1"
    shadow-intensity="1"
    camera-orbit="45deg 75deg 2m"
    style="width:300px;height:300px;">
</model-viewer>

<div class="upgrade">
    <p>Доход за клик: <span id="power">1</span></p>
    <button id="upgradeBtn">
        Улучшить (+1 клик)
        Цена: <span id="price">50</span>
    </button>
</div>

</div>

<script>

let coins = Number(localStorage.getItem("coins")) || 0;
let power = Number(localStorage.getItem("power")) || 1;
let price = Number(localStorage.getItem("price")) || 50;

const coinsEl = document.getElementById("coins");
const powerEl = document.getElementById("power");
const priceEl = document.getElementById("price");

function save(){
    localStorage.setItem("coins", coins);
    localStorage.setItem("power", power);
    localStorage.setItem("price", price);
}

function render(){
    coinsEl.innerText = coins;
    powerEl.innerText = power;
    priceEl.innerText = price;
}

document.getElementById("coinBtn").onclick = () => {
    coins += power;
    save();
    render();
};

document.getElementById("upgradeBtn").onclick = () => {

    if(coins >= price){
        coins -= price;
        power += 1;
        price = Math.floor(price * 1.8);

        save();
        render();
    }
};

render();

</script>

</body>
</html>
