<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FeetShop Coin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            min-height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            background: #111;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: #222;
            border: none;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active {
            background: #333;
            color: #FFD700;
            border-bottom: 2px solid #FFD700;
        }

        /* Кликер */
        #clickerPage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 0;
        }
        .balance-box {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
        }
        .balance {
            font-size: 40px;
            font-weight: bold;
            color: #FFD700;
        }
        .power {
            font-size: 14px;
            color: #aaa;
            margin-top: 5px;
        }
        .heart {
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .heart:active { transform: scale(0.85); }

        /* Магазин */
        #shopPage {
            display: none;
            padding: 15px;
        }
        .shop-item {
            background: #222;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shop-info {
            flex: 1;
        }
        .shop-name {
            font-size: 16px;
            font-weight: bold;
        }
        .shop-desc {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }
        .shop-bonus {
            font-size: 13px;
            color: #4CAF50;
            margin-top: 3px;
        }
        .shop-price {
            font-size: 18px;
            font-weight: bold;
            color: #FFD700;
            margin-top: 5px;
        }
        .buy-btn {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            margin-left: 10px;
        }
        .buy-btn:active { background: #388E3C; }
        .buy-btn.max {
            background: #555;
            color: #999;
        }

        /* Инвентарь */
        #invPage {
            display: none;
            padding: 15px;
        }
        .inv-item {
            background: #222;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            text-align: left;
        }
        .inv-name {
            font-size: 16px;
            font-weight: bold;
        }
        .inv-tier {
            font-size: 13px;
            color: #FFD700;
        }
        .inv-effect {
            font-size: 13px;
            color: #4CAF50;
        }

        .plus-one {
            position: fixed;
            pointer-events: none;
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-80px); }
        }
    </style>
</head>
<body>
    <!-- Вкладки -->
    <div class="tabs">
        <button class="tab active" onclick="showPage('clicker')">⭐ Кликер</button>
<button class="tab" onclick="showPage('shop')">🛒 Магазин</button>
<button class="tab" onclick="showPage('inv')">🎒 Инвентарь</button>
<button class="tab" onclick="showPage('top')">🏆 ТОП</button>
    </div>

    <!-- Кликер -->
    <div id="clickerPage">
        <div class="balance-box">
            <div class="balance" id="balance">0 ⭐</div>
            <div class="power" id="power">Сила: 1</div>
        </div>
        <div class="heart" id="heart" onclick="clickHeart(event)">❤️</div>
    </div>

    <!-- Магазин -->
    <div id="shopPage">
        <div id="shopBalance" style="font-size:20px;color:#FFD700;margin-bottom:15px;">💰 0 ⭐</div>
        <div id="shopItems"></div>
    </div>

    <!-- Инвентарь -->
    <div id="topPage" style="display:none;padding:15px;">
    <h2 style="color:#FFD700;margin-bottom:15px;">🏆 ТОП 50 ИГРОКОВ</h2>
    <div id="topPlayers"></div>

    </div>

    <script>
        const tg = Telegram.WebApp;
        tg.expand();
        tg.ready();

        let score = 0;
        let power = 1;

        // Товары (синхронизированы с ботом)
        const SHOP = [
            {id:"thimble",name:"💍 Латексный наперсток",prices:[100,500,1500,5000,15000],bonus:[1,3,5,10,15],desc:"Сила клика"},
            {id:"ring",name:"⚡ Разряд-Кольцо",prices:[300,800,2000,5000,12000],bonus:[10,13,17,21,25],desc:"Шанс крита %"},
            {id:"mouse",name:"🖱️ Мышь-Кликанутая",prices:[200,600,1500,4000,10000],bonus:[1,2,5,8,12],desc:"Автокликер/10сек"},
            {id:"broom",name:"🧹 Веник-бот",prices:[100,300,800,2000,5000],bonus:[1,3,5,8,10],desc:"Монет/10сек"},
            {id:"hat",name:"🎩 Шляпа фокусника",prices:[5000],bonus:[0],desc:"100-й клик x10"}
        ];

        // Инвентарь (загружается из URL)
        let inventory = {};

        // ========== ЗАГРУЗКА ==========
        function loadData() {
            const params = new URLSearchParams(window.location.search);
            const bal = parseInt(params.get('balance'));
            const pow = parseInt(params.get('power'));
            const inv = params.get('inv');

            if (bal && bal > 0) score = bal;
            if (pow && pow > 0) power = pow;
            if (inv) {
                try { inventory = JSON.parse(decodeURIComponent(inv)); } catch(e) { inventory = {}; }
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = score + ' ⭐';
            document.getElementById('power').innerText = 'Сила: ' + power;
            document.getElementById('shopBalance').innerText = '💰 ' + score + ' ⭐';
            renderShop();
            renderInventory();
        }

        // ========== СТРАНИЦЫ ==========
        function showPage(page) {

    document.getElementById('clickerPage').style.display =
        page === 'clicker' ? 'flex' : 'none';

    document.getElementById('shopPage').style.display =
        page === 'shop' ? 'block' : 'none';

    document.getElementById('invPage').style.display =
        page === 'inv' ? 'block' : 'none';

    document.getElementById('topPage').style.display =
        page === 'top' ? 'block' : 'none';

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    if (page === 'clicker') document.querySelectorAll('.tab')[0].classList.add('active');
    if (page === 'shop') document.querySelectorAll('.tab')[1].classList.add('active');
    if (page === 'inv') document.querySelectorAll('.tab')[2].classList.add('active');
    if (page === 'top') document.querySelectorAll('.tab')[3].classList.add('active');

    if (page === 'shop') renderShop();
    if (page === 'inv') renderInventory();
    if (page === 'top') renderTop();
}

        // ========== КЛИК ==========
        function clickHeart(e) {
            score += power;
            document.getElementById('balance').innerText = score + ' ⭐';
            tg.HapticFeedback.impactOccurred('medium');
            tg.sendData(JSON.stringify({ action: "click" }));

            // Анимация
            const plus = document.createElement('div');
            plus.className = 'plus-one';
            plus.innerText = '+' + power;
            plus.style.left = (e.clientX || e.touches?.[0]?.clientX || 200) + 'px';
            plus.style.top = (e.clientY || e.touches?.[0]?.clientY || 300) + 'px';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 800);
        }

        // ========== МАГАЗИН ==========
        function getTier(itemId) {
            return inventory[itemId] || 0;
        }

        function renderShop() {
            let html = '';
            SHOP.forEach(item => {
                const tier = getTier(item.id);
                const maxTier = item.prices.length;

                if (tier >= maxTier) {
                    html += `<div class="shop-item">
                        <div class="shop-info">
                            <div class="shop-name">${item.name}</div>
                            <div class="shop-desc">МАКС. УРОВЕНЬ</div>
                        </div>
                        <button class="buy-btn max">✓</button>
                    </div>`;
                } else {
                    const price = item.prices[tier];
                    const bonus = item.bonus[tier];
                    const bonusText = item.id === 'hat' ? '100-й клик x10' : `+${bonus} ${item.desc}`;
                    html += `<div class="shop-item">
                        <div class="shop-info">
                            <div class="shop-name">${item.name}</div>
                            <div class="shop-desc">УР.${tier} → УР.${tier+1}</div>
                            <div class="shop-bonus">${bonusText}</div>
                            <div class="shop-price">${price} ⭐</div>
                        </div>
                        <button class="buy-btn" onclick="buyItem('${item.id}',${price})">КУПИТЬ</button>
                    </div>`;
                }
            });
            document.getElementById('shopItems').innerHTML = html;
        }

        function buyItem(itemId, price) {
            if (score < price) {
                tg.showPopup({title:'Ошибка', message:'Недостаточно монет!'});
                return;
            }

            score -= price;
            inventory[itemId] = (inventory[itemId] || 0) + 1;

            // Обновляем силу клика
            if (itemId === 'thimble') {
                const tier = inventory[itemId];
                power = 1 + SHOP.find(i=>i.id==='thimble').bonus[tier-1];
            }

            tg.sendData(JSON.stringify({ action: "buy", item: itemId, price: price }));
            tg.showPopup({title:'Успех!', message:'Покупка совершена!'});
            updateUI();
        }

        // ========== ИНВЕНТАРЬ ==========
        function renderInventory() {
            let html = '';
            let has = false;
            SHOP.forEach(item => {
                const tier = getTier(item.id);
                if (tier > 0) {
                    has = true;
                    const bonus = item.bonus[tier-1];
                    const effect = item.id === 'hat' ? '100-й клик x10' : `+${bonus} ${item.desc}`;
                    html += `<div class="inv-item">
                        <div class="inv-name">${item.name}</div>
                        <div class="inv-tier">Уровень ${tier}</div>
                        <div class="inv-effect">${effect}</div>
                    </div>`;
                }
            });
            if (!has) html = '<div style="color:#888;padding:20px;">ПУСТО. КУПИ В МАГАЗИНЕ!</div>';
            document.getElementById('invItems').innerHTML = html;
        }
function renderTop() {

    let players = [];

    for(let i = 1; i <= 50; i++) {

        players.push({
            name: "Игрок_" + i,
            coins: Math.floor(Math.random() * 500000) + 1000,
            cps: (Math.random() * 25 + 1).toFixed(1)
        });

    }

    players.sort((a,b) => b.coins - a.coins);

    let html = "";

    players.forEach((p,index) => {

        let medal = "";

        if(index === 0) medal = "🥇";
        else if(index === 1) medal = "🥈";
        else if(index === 2) medal = "🥉";

        html += `
        <div style="
            background:#222;
            padding:12px;
            border-radius:12px;
            margin-bottom:8px;
            text-align:left;
        ">
            ${medal} <b>#${index+1}</b>
            ${p.name}<br>
            💰 ${p.coins.toLocaleString()} ⭐
            | ⚡ ${p.cps} к/с
        </div>
        `;
    });

    document.getElementById("topPlayers").innerHTML = html;
}

        // ========== ЗАПУСК ==========
        loadData();
    </script>
</body>
</html>
