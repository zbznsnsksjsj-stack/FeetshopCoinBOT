<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .heart { font-size: 120px; cursor: pointer; user-select: none; }
    </style>
</head>
<body>
    <div id="score" style="font-size: 40px;">0 ⭐</div>
    <div class="heart" onclick="clickHeart()">❤️</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Читаем баланс из ссылки, которую прислал бот
        const urlParams = new URLSearchParams(window.location.search);
        let score = parseInt(urlParams.get('balance')) || 0;
        document.getElementById('score').innerText = score + " ⭐";

        function clickHeart() {
            score++;
            document.getElementById('score').innerText = score + " ⭐";
            tg.sendData(JSON.stringify({action: "click"}));
        }
    </script>
</body>
</html>
